# Nginx配置文件 - Docker环境下的负载均衡配置

events {
    worker_connections 1024;
}

# TCP负载均衡配置 (Stream模块)
stream {
    # 定义上游服务器组
    upstream chat_backend {
        # Docker容器名称作为主机名
        server chat_server_1:6000 weight=1 max_fails=3 fail_timeout=30s;
        server chat_server_2:6001 weight=1 max_fails=3 fail_timeout=30s;
        server chat_server_3:6002 weight=1 max_fails=3 fail_timeout=30s;
        
        # 负载均衡算法 - 默认为轮询
        # 可选: ip_hash (基于客户端IP的会话保持)
        # ip_hash;
    }
    
    # 服务器监听配置
    server {
        # 监听端口
        listen 7000;
        
        # 代理到上游服务器
        proxy_pass chat_backend;
        
        # 代理超时设置
        proxy_timeout 3s;
        proxy_responses 1;
        
        # 日志配置
        error_log /var/log/nginx/chat_error.log;
        access_log /var/log/nginx/chat_access.log;
    }
}

# HTTP配置 (管理接口)
http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # HTTP服务器配置
    server {
        listen 8080;
        server_name localhost;
        
        # 健康检查接口
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
        
        # 状态监控接口
        location /status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }
}