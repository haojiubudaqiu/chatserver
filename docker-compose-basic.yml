services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: chat_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Sf523416&111
      MYSQL_DATABASE: chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat_network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat_network
    restart: unless-stopped

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: chat_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - chat_network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: chat_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器
  chat_server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server
    depends_on:
      - mysql
      - redis
    ports:
      - "6000:6000"
    environment:
      - SERVER_PORT=6000
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # Nginx
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: chat_nginx
    depends_on:
      - chat_server
    ports:
      - "7000:7000"
      - "8080:8080"
    networks:
      - chat_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  chat_network:
    driver: bridge