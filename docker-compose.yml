version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: chat_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Sf523416&111
      MYSQL_DATABASE: chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat_network
    restart: unless-stopped

  # Redis服务
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat_network
    restart: unless-stopped

  # Kafka服务（可选）
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: chat_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - chat_network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: chat_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例1
  chat_server_1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_1
    depends_on:
      - mysql
      - redis
    ports:
      - "6000:6000"
    environment:
      - SERVER_PORT=6000
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例2
  chat_server_2:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_2
    depends_on:
      - mysql
      - redis
    ports:
      - "6001:6001"
    environment:
      - SERVER_PORT=6001
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例3
  chat_server_3:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_3
    depends_on:
      - mysql
      - redis
    ports:
      - "6002:6002"
    environment:
      - SERVER_PORT=6002
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # Nginx负载均衡器
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: chat_nginx
    depends_on:
      - chat_server_1
      - chat_server_2
      - chat_server_3
    ports:
      - "7000:7000"
      - "8080:8080"
    networks:
      - chat_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  chat_network:
    driver: bridge