services:
  # MySQL 主数据库
  mysql-master:
    image: mysql:8.0
    container_name: chat_mysql_master
    environment:
      MYSQL_ROOT_PASSWORD: Sf523416&111
      MYSQL_DATABASE: chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/master.cnf:/etc/mysql/conf.d/master.cnf
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat_network
    restart: unless-stopped

  # MySQL 从数据库 1
  mysql-slave1:
    image: mysql:8.0
    container_name: chat_mysql_slave1
    environment:
      MYSQL_ROOT_PASSWORD: Sf523416&111
      MYSQL_DATABASE: chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpass123
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave1_data:/var/lib/mysql
      - ./docker/mysql/slave1.cnf:/etc/mysql/conf.d/slave.cnf
    networks:
      - chat_network
    restart: unless-stopped
    depends_on:
      - mysql-master

  # MySQL 从数据库 2
  mysql-slave2:
    image: mysql:8.0
    container_name: chat_mysql_slave2
    environment:
      MYSQL_ROOT_PASSWORD: Sf523416&111
      MYSQL_DATABASE: chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpass123
    ports:
      - "3308:3306"
    volumes:
      - mysql_slave2_data:/var/lib/mysql
      - ./docker/mysql/slave2.cnf:/etc/mysql/conf.d/slave.cnf
    networks:
      - chat_network
    restart: unless-stopped
    depends_on:
      - mysql-master

  # Redis 主节点
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat_network
    restart: unless-stopped

  # Redis 从节点 1
  redis-slave1:
    image: redis:7-alpine
    container_name: chat_redis_slave1
    ports:
      - "6380:6379"
    volumes:
      - redis_slave1_data:/data
    command: redis-server --replicaof chat_redis 6379
    depends_on:
      - redis
    networks:
      - chat_network
    restart: unless-stopped

  # Redis 从节点 2
  redis-slave2:
    image: redis:7-alpine
    container_name: chat_redis_slave2
    ports:
      - "6381:6379"
    volumes:
      - redis_slave2_data:/data
    command: redis-server --replicaof chat_redis 6379
    depends_on:
      - redis
    networks:
      - chat_network
    restart: unless-stopped

  # Redis Sentinel 1
  redis-sentinel1:
    image: redis:7-alpine
    container_name: chat_redis_sentinel1
    ports:
      - "26379:26379"
    volumes:
      - ./redis-sentinel1.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - chat_network
    depends_on:
      - redis

  # Redis Sentinel 2
  redis-sentinel2:
    image: redis:7-alpine
    container_name: chat_redis_sentinel2
    ports:
      - "26380:26379"
    volumes:
      - ./redis-sentinel2.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - chat_network
    depends_on:
      - redis

  # Redis Sentinel 3
  redis-sentinel3:
    image: redis:7-alpine
    container_name: chat_redis_sentinel3
    ports:
      - "26381:26379"
    volumes:
      - ./redis-sentinel3.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - chat_network
    depends_on:
      - redis

  # ZooKeeper (Kafka 依赖)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: chat_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - chat_network
    restart: unless-stopped

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: chat_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例 1
  chat_server_1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_1
    depends_on:
      - mysql-master
      - mysql-slave1
      - mysql-slave2
      - redis
      - kafka
    ports:
      - "6000:6000"
    environment:
      - SERVER_PORT=6000
      - MYSQL_HOST=mysql-master
      - MYSQL_USER=chatuser
      - MYSQL_PASSWORD=chatpass123
      - MYSQL_DATABASE=chat
      - MYSQL_SLAVES=mysql-slave1:3306,mysql-slave2:3306
      - REDIS_HOST=redis
      - REDIS_SENTINEL1=redis-sentinel1:26379
      - REDIS_SENTINEL2=redis-sentinel2:26379
      - REDIS_SENTINEL3=redis-sentinel3:26379
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例 2
  chat_server_2:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_2
    depends_on:
      - mysql-master
      - mysql-slave1
      - mysql-slave2
      - redis
      - kafka
    ports:
      - "6001:6001"
    environment:
      - SERVER_PORT=6001
      - MYSQL_HOST=mysql-master
      - MYSQL_USER=chatuser
      - MYSQL_PASSWORD=chatpass123
      - MYSQL_DATABASE=chat
      - MYSQL_SLAVES=mysql-slave1:3306,mysql-slave2:3306
      - REDIS_HOST=redis
      - REDIS_SENTINEL1=redis-sentinel1:26379
      - REDIS_SENTINEL2=redis-sentinel2:26379
      - REDIS_SENTINEL3=redis-sentinel3:26379
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # 聊天服务器实例 3
  chat_server_3:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: chat_server_3
    depends_on:
      - mysql-master
      - mysql-slave1
      - mysql-slave2
      - redis
      - kafka
    ports:
      - "6002:6002"
    environment:
      - SERVER_PORT=6002
      - MYSQL_HOST=mysql-master
      - MYSQL_USER=chatuser
      - MYSQL_PASSWORD=chatpass123
      - MYSQL_DATABASE=chat
      - MYSQL_SLAVES=mysql-slave1:3306,mysql-slave2:3306
      - REDIS_HOST=redis
      - REDIS_SENTINEL1=redis-sentinel1:26379
      - REDIS_SENTINEL2=redis-sentinel2:26379
      - REDIS_SENTINEL3=redis-sentinel3:26379
      - KAFKA_HOST=kafka
    networks:
      - chat_network
    restart: unless-stopped

  # Nginx 负载均衡器
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: chat_nginx
    depends_on:
      - chat_server_1
      - chat_server_2
      - chat_server_3
    ports:
      - "7000:7000"
      - "8080:8080"
    networks:
      - chat_network
    restart: unless-stopped

volumes:
  mysql_master_data:
  mysql_slave1_data:
  mysql_slave2_data:
  redis_data:
  redis_slave1_data:
  redis_slave2_data:

networks:
  chat_network:
    driver: bridge
